<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e12"/>
      <stop offset="100%" stop-color="#131922"/>
    </linearGradient>
    <radialGradient id="fog" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.25">
    <rect x="60" y="200" width="210" height="500" fill="#2c3440"/>
    <rect x="330" y="260" width="170" height="440" fill="#212a35"/>
    <rect x="560" y="180" width="120" height="520" fill="#2f3843"/>
    <rect x="1280" y="230" width="190" height="470" fill="#242d38"/>
    <rect x="1060" y="280" width="170" height="420" fill="#1d2530"/>
  </g>
  <g opacity="0.5">
    <ellipse cx="800" cy="680" rx="520" ry="110" fill="#0a0d11"/>
    <ellipse cx="800" cy="600" rx="340" ry="90" fill="#141b24"/>
  </g>
  <rect width="1600" height="900" fill="url(#fog)"/>
  <rect width="1600" height="900" filter="url(#grain)"/>
</svg>
